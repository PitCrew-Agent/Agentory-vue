name: Deploy

on:
  push:
    branches: [dev]
  # 수동 배포도 가능하도록
  workflow_dispatch:

# 배포는 동시에 하나만 (중복 무효화 방지)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC 사용 시 필요

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_API_TIMEOUT_MS: ${{ vars.VITE_API_TIMEOUT_MS }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          # 방법 A) OIDC 역할 (권장) — 아래 role-to-assume 에 IAM Role ARN 설정
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # 방법 B) 액세스 키를 쓰려면 위 role-to-assume 줄을 지우고 아래 두 줄의 주석을 해제
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Sync to S3
        run: |
          # 해시가 붙은 정적 에셋은 장기 캐시
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html 은 캐시하지 않음 (항상 최신 SPA 진입점)
          aws s3 cp dist/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
