name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# 같은 브랜치/PR에서 새 커밋이 올라오면 이전 실행 취소
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 앱이 import 시점에 VITE_API_BASE_URL 을 요구하므로 CI 전용 더미 값으로 폴백.
# 실제 배포 값은 deploy.yml 의 vars.VITE_API_BASE_URL 에서 주입.
env:
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:8000' }}
  VITE_API_TIMEOUT_MS: ${{ vars.VITE_API_TIMEOUT_MS || '10000' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # CI에서는 자동 수정 없이 검사만 수행 (package.json 스크립트는 --fix 라 직접 호출)
      - name: oxlint
        run: npx oxlint .

      - name: eslint
        run: npx eslint .

      - name: prettier check
        run: npx prettier --check src/

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Vitest
        run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      # playwright.config.js 의 webServer 가 CI 에서 `npm run preview`(4173) 실행
      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
